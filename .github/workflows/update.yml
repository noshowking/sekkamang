name: Update SOOP Calendar

on:
  schedule:
    # 매시 :13, :43 실행 (정각/30분 혼잡 시간대를 피해 누락 최소화)
    - cron: '13,43 * * * *'
  workflow_dispatch:           # GitHub에서 수동 실행 버튼

permissions:
  contents: write              # keepalive 빈 커밋(60일 자동중지 방지)용
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 크롤링 & 사이트 생성
        run: python build_site.py

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 산출물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 배포
        id: deployment
        uses: actions/deploy-pages@v4

      # 오늘 예측을 기록한 predictions.json이 바뀌었으면 저장소에 커밋(그날 예측을 영구 보존).
      # 하루 한 번꼴로 커밋되므로 60일 자동중지도 자연히 방지됨.
      - name: 예측 로그 커밋 (predictions.json)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain predictions.json)" ]; then
            git add predictions.json
            git commit -m "chore: 예측 로그 업데이트 ($(date -u +%Y-%m-%d))"
            git push || echo "push 실패(다음 실행 때 재시도)"
            echo "예측 로그 커밋 완료"
          else
            echo "예측 로그 변경 없음"
          fi
