name: Update SOOP Calendar

on:
  schedule:
    # 매시 :13, :43 실행 (정각/30분 혼잡 시간대를 피해 누락 최소화)
    - cron: '13,43 * * * *'
  workflow_dispatch:           # GitHub에서 수동 실행 버튼

permissions:
  contents: write              # keepalive 커밋(60일 자동중지 방지)용
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 크롤링 & 사이트 생성
        run: python build_site.py

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 산출물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 배포
        id: deployment
        uses: actions/deploy-pages@v4

      # 저장소가 60일간 '활동 없음'이면 GitHub가 예약 실행을 꺼버림.
      # 이 워크플로는 커밋을 안 만들어서 idle 상태가 되므로, 주기적으로
      # 빈 커밋을 남겨 자동중지를 방지한다(약 45일에 한 번만 커밋).
      - name: 60일 자동중지 방지 (keepalive)
        uses: gautamkrishnar/keepalive-workflow@v2
