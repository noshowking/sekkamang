name: Update SOOP Calendar

on:
  schedule:
    # 매시 :13, :43 실행 (정각/30분 혼잡 시간대를 피해 누락 최소화)
    - cron: '13,43 * * * *'
  workflow_dispatch:           # GitHub에서 수동 실행 버튼

permissions:
  contents: write              # keepalive 빈 커밋(60일 자동중지 방지)용
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 크롤링 & 사이트 생성
        run: python build_site.py

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 산출물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 배포
        id: deployment
        uses: actions/deploy-pages@v4

      # 60일간 활동이 없으면 GitHub가 예약 실행을 자동 중지함.
      # 서드파티 액션 없이, 마지막 커밋이 40일 이상 지났을 때만 빈 커밋을 남겨 방지.
      - name: 60일 자동중지 방지 (keepalive, 순수 git)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          LAST=$(git log -1 --format=%ct 2>/dev/null || echo 0)
          NOW=$(date +%s)
          DAYS=$(( (NOW - LAST) / 86400 ))
          echo "마지막 커밋 이후 ${DAYS}일"
          if [ "$DAYS" -ge 40 ]; then
            git commit --allow-empty -m "chore: keepalive (예약 실행 유지)"
            git push
            echo "keepalive 커밋 push 완료"
          else
            echo "아직 40일 미만 → keepalive 생략"
          fi
