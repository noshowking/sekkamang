name: Update SOOP Calendar

on:
  schedule:
    - cron: '*/30 * * * *'     # 30분마다 자동 실행
  workflow_dispatch:           # 수동 실행 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 크롤링 & 사이트 생성
        run: python build_site.py

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 산출물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 배포
        id: deployment
        uses: actions/deploy-pages@v4
